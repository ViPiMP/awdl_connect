name: Build Unsigned iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🛠️ Setup newest Xcode
      run: |
        # Scannt das System nach der höchsten Xcode-Version (verhindert Format 77 Fehler)
        LATEST_XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
        echo "Wechsle zu Compiler: $LATEST_XCODE"
        sudo xcode-select -switch "$LATEST_XCODE/Contents/Developer"

    - name: 🏗️ Build App (ohne Code Signing)
      run: |
        # Sucht die .xcodeproj-Datei dynamisch, um Groß-/Kleinschreibungs-Fehler abzufangen
        PROJECT_FILE=$(ls -d *.xcodeproj | head -n 1)
        
        # Überschreibt das iOS 18.6 Target und killt die fremde Team-ID des Entwicklers
        xcodebuild clean build \
          -project "$PROJECT_FILE" \
          -scheme "awdl_test" \
          -destination 'generic/platform=iOS' \
          IPHONEOS_DEPLOYMENT_TARGET="17.0" \
          DEVELOPMENT_TEAM="" \
          CODE_SIGNING_ALLOWED="NO" \
          CODE_SIGNING_REQUIRED="NO" \
          CODE_SIGN_IDENTITY=""

    - name: 📦 Package to .IPA
      run: |
        # Sucht die kompilierte App dynamisch im abgeleiteten Daten-Ordner
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "awdl_test.app" -type d | head -n 1)
        
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r awdl_connect_unsigned.ipa Payload

    - name: 🚀 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: awdl_connect_app
        path: awdl_connect_unsigned.ipa
