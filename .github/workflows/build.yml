name: Build Unsigned iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: 🛠️ Setup Xcode
      run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer

    - name: 🏗️ Build App (ohne Code Signing)
      run: |
        # Projektname und Scheme auf Awdl_test aktualisiert
        xcodebuild clean build \
          -project "Awdl_test.xcodeproj" \
          -scheme "Awdl_test" \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED="NO" \
          CODE_SIGNING_REQUIRED="NO" \
          CODE_SIGN_IDENTITY=""

    - name: 📦 Package to .IPA (für Sideloading)
      run: |
        # Sucht jetzt nach der korrekten Awdl_test.app in den DerivedData
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Awdl_test.app" -type d | head -n 1)
        
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r awdl_connect_unsigned.ipa Payload

    - name: 🚀 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: awdl_connect_app
        path: awdl_connect_unsigned.ipa
